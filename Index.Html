<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lelang GTPS • modern</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Inter,system-ui}
body{background:#f6f9fe;display:flex;justify-content:center;padding:1rem}
.gtps-app{max-width:860px;width:100%;background:#fff;border-radius:30px;box-shadow:0 20px 40px -10px rgba(0,0,0,.25);overflow:hidden}
.header{display:flex;justify-content:space-between;align-items:center;padding:1.5rem}
.header h1{font-size:1.8rem;color:#0a3a66}
.nav{display:flex;border-bottom:1px solid #ddd}
.nav button{flex:1;padding:1rem;border:none;background:#fff;cursor:pointer;font-weight:600}
.nav button.active{background:#f0f7ff;color:#0a58ca}
.panel{display:none;padding:1.5rem}
.panel.active{display:block}
.input{width:100%;padding:.8rem;border-radius:50px;border:1px solid #ccc;margin-bottom:1rem}
.btn{padding:.8rem 1.5rem;border:none;border-radius:50px;background:#0a3a66;color:#fff;cursor:pointer}
.auction-box{background:#f5f9ff;padding:1.5rem;border-radius:20px;margin-bottom:1rem}
.big{font-size:2rem;font-weight:700}
.timer{background:#e3efff;padding:1rem;border-radius:50px;text-align:center;font-weight:600}
.chat-box{height:250px;overflow:auto;background:#f5faff;padding:1rem;border-radius:20px;margin-bottom:1rem}
.chat-bubble{background:#fff;padding:.6rem 1rem;border-radius:20px;margin-bottom:.5rem;border:1px solid #ddd}
.chat-bubble.own{background:#d9ebff}
.history{background:#f5faff;padding:1rem;border-radius:20px;max-height:200px;overflow:auto}
</style>
</head>
<body>
<div class="gtps-app">

<div class="header">
<h1>LELANG GTPS</h1>
<div onclick="switchPanel('profile')" style="cursor:pointer;font-weight:600" id="growidDisplay">PlayerGTPS</div>
</div>

<div class="nav">
<button id="tabProfile" class="active" onclick="switchPanel('profile')">Profil</button>
<button id="tabAuction" onclick="switchPanel('auction')">Lelang</button>
<button id="tabChat" onclick="switchPanel('chat')">Chat</button>
<button id="tabBid" onclick="switchPanel('bid')">Bid</button>
</div>

<div id="panelProfile" class="panel active">
<input class="input" id="growidInput" placeholder="GrowID">
<button class="btn" onclick="saveProfile()">Simpan</button>
<br><br>
<input type="password" id="ownerPass" class="input" placeholder="Owner Password">
<button class="btn" onclick="ownerLogin()">Login Owner</button>

<div id="ownerPanel" style="display:none;margin-top:1rem">
<input class="input" id="itemName" placeholder="Nama Item">
<input class="input" id="itemQty" placeholder="Jumlah">
<input class="input" id="itemImg" placeholder="URL Gambar">
<input class="input" id="duration" placeholder="Durasi (menit)">
<button class="btn" onclick="createAuction()">Mulai Lelang</button>
</div>
</div>

<div id="panelAuction" class="panel">
<div class="auction-box">
<img id="displayImg" src="https://placehold.co/120x120" width="100">
<h2 id="displayItem">-</h2>
Jumlah: <span id="displayQty">0</span>
</div>
<div class="big"><span id="highestBid">0</span> BGL</div>
Highest: <span id="highestBidder">-</span>
<div class="timer" id="timer">--</div>
</div>

<div id="panelChat" class="panel">
<div class="chat-box" id="chatMessages"></div>
<input class="input" id="chatInput" placeholder="Tulis pesan">
<button class="btn" onclick="sendChat()">Kirim</button>
</div>

<div id="panelBid" class="panel">
<input type="number" class="input" id="bidAmount" placeholder="Jumlah">
<select class="input" id="currency">
<option value="BGL">BGL</option>
<option value="DL">DL</option>
<option value="WL">WL</option>
</select>
<button class="btn" onclick="placeBid()">Bid</button>
<br><br>
<div class="history" id="bidHistory"></div>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, set, update, push, onValue, onChildAdded, get, query, limitToLast } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
apiKey:"AIzaSyC8QrDc5NiyyEZwl8sqBSVEPkymTkpgOiU",
authDomain:"leetopia-auction.firebaseapp.com",
databaseURL:"https://leetopia-auction-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId:"leetopia-auction",
storageBucket:"leetopia-auction.firebasestorage.app",
messagingSenderId:"396746559389",
appId:"1:396746559389:web:21fa42ddc49366b6106974"
};

const app=initializeApp(firebaseConfig);
const db=getDatabase(app);

let currentGrowID=localStorage.getItem("growid")||"PlayerGTPS";
document.getElementById("growidInput").value=currentGrowID;
document.getElementById("growidDisplay").innerText=currentGrowID;

window.switchPanel=function(p){
document.querySelectorAll(".panel").forEach(x=>x.classList.remove("active"));
document.getElementById("panel"+capitalize(p)).classList.add("active");
document.querySelectorAll(".nav button").forEach(x=>x.classList.remove("active"));
document.getElementById("tab"+capitalize(p)).classList.add("active");
}

function capitalize(t){return t.charAt(0).toUpperCase()+t.slice(1)}

window.saveProfile=function(){
const val=document.getElementById("growidInput").value.trim();
if(val){currentGrowID=val;localStorage.setItem("growid",val);
document.getElementById("growidDisplay").innerText=val;}
}

window.ownerLogin=function(){
if(document.getElementById("ownerPass").value==="12345"){
document.getElementById("ownerPanel").style.display="block";
}else alert("Password salah");
}

window.createAuction=function(){
const name=itemName.value;
const qty=itemQty.value;
const img=itemImg.value;
const duration=parseInt(document.getElementById("duration").value)||5;
const endTime=Date.now()+duration*60000;
set(ref(db,"auction/current"),{itemName:name,itemQty:qty,imageUrl:img,highestBid:0,highestBidder:"-",endTime});
set(ref(db,"bids"),null);
}

function convert(a,c){if(c==="DL")return a*100;if(c==="WL")return a/100;return a}

window.placeBid=function(){
const amt=parseFloat(bidAmount.value);
if(!amt)return;
const cur=currency.value;
const bidVal=convert(amt,cur);
get(ref(db,"auction/current")).then(s=>{
const d=s.val();if(!d)return;
if(Date.now()>d.endTime)return alert("Lelang selesai");
if(bidVal>d.highestBid){
update(ref(db,"auction/current"),{highestBid:bidVal,highestBidder:currentGrowID});
push(ref(db,"bids"),{growid:currentGrowID,amount:bidVal});
}else alert("Bid harus lebih tinggi");
});
}

let timerInt=null;
onValue(ref(db,"auction/current"),s=>{
const d=s.val();
if(!d)return;
displayItem.innerText=d.itemName||"-";
displayQty.innerText=d.itemQty||0;
displayImg.src=d.imageUrl||"https://placehold.co/120x120";
highestBid.innerText=d.highestBid||0;
highestBidder.innerText=d.highestBidder||"-";
if(timerInt)clearInterval(timerInt);
timerInt=setInterval(()=>{
const r=d.endTime-Date.now();
if(r<=0){timer.innerText="Selesai";clearInterval(timerInt);}
else{timer.innerText=Math.floor(r/60000)+"m "+Math.floor((r%60000)/1000)+"s";}
},500);
});

const hist=document.getElementById("bidHistory");
onChildAdded(query(ref(db,"bids"),limitToLast(20)),s=>{
const b=s.val();if(!b)return;
const div=document.createElement("div");
div.className="chat-bubble";
div.innerText=b.growid+" : "+b.amount+" BGL";
hist.prepend(div);
});

const chatDiv=document.getElementById("chatMessages");
window.sendChat=function(){
const text=chatInput.value.trim();
if(!text)return;
push(ref(db,"chat"),{growid:currentGrowID,message:text});
chatInput.value="";
}
onChildAdded(query(ref(db,"chat"),limitToLast(50)),s=>{
const c=s.val();if(!c)return;
const div=document.createElement("div");
div.className="chat-bubble"+(c.growid===currentGrowID?" own":"");
div.innerHTML="<b>"+c.growid+"</b><br>"+c.message;
chatDiv.appendChild(div);
chatDiv.scrollTop=chatDiv.scrollHeight;
});
</script>

</body>
</html>
