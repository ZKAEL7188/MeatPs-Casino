<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MeatBET • GTPS Casino</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #0a0404;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 12px;
        }

        .website-container {
            max-width: 420px;
            width: 100%;
            background-color: #100808;
            border-radius: 32px;
            box-shadow: 0 20px 40px rgba(255, 0, 0, 0.15);
            overflow: hidden;
            border: 1px solid #301010;
            position: relative;
        }

        .content {
            padding: 16px 16px 12px;
        }

        /* Top Bar */
        .top-bar {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 16px;
        }

        .profile-mini {
            width: 48px;
            height: 48px;
            background: linear-gradient(145deg, #c02020, #8b0000);
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: 2px solid #a03030;
            font-weight: 800;
            font-size: 20px;
            color: white;
            box-shadow: 0 4px 0 #4a0000;
            transition: all 0.2s;
        }

        .profile-mini:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 0 #4a0000;
        }

        .balance-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            background: linear-gradient(145deg, #1e0c0c, #140808);
            padding: 6px 12px;
            border-radius: 40px;
            border: 1px solid #501010;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.5);
            cursor: pointer;
        }

        .balance-item {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: #2a1414;
            padding: 4px 8px;
            border-radius: 30px;
            border: 1px solid #601010;
        }

        .balance-icon {
            width: 18px;
            height: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            order: 1;
        }

        .balance-icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .balance-text {
            color: white;
            font-weight: 700;
            font-size: 14px;
            order: 0;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(145deg, #c02020, #8b0000);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 12px rgba(200, 0, 0, 0.5);
        }

        .logo-icon svg {
            width: 24px;
            height: 24px;
            fill: white;
        }

        .logo-text {
            font-size: 24px;
            font-weight: 800;
            color: #f0d0d0;
            letter-spacing: 1px;
            text-transform: uppercase;
            text-shadow: 0 2px 5px rgba(255,0,0,0.3);
        }

        .notification-btn {
            width: 44px;
            height: 44px;
            background-color: #1e0c0c;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #601010;
            cursor: pointer;
            transition: all 0.2s;
        }

        .notification-btn:hover {
            background-color: #2a1414;
            border-color: #a03030;
        }

        .notification-btn svg {
            width: 22px;
            height: 22px;
            fill: #d06060;
        }

        /* Welcome section */
        .welcome-section {
            margin-bottom: 16px;
            text-align: center;
            background: linear-gradient(145deg, #1e0c0c, #140808);
            padding: 12px;
            border-radius: 20px;
            border: 1px solid #501010;
        }

        .welcome-text {
            font-size: 18px;
            font-weight: 700;
            color: #f0b0b0;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .welcome-text span {
            color: #d03030;
            font-weight: 800;
            font-size: 22px;
            display: block;
            margin-top: 4px;
        }

        /* Lihat ini */
        .lihat-ini-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .lihat-ini-header h3 {
            color: #f0b0b0;
            font-size: 15px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .arrow-btn {
            color: #b05050;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        /* Cards */
        .bonus-cards {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
        }

        .bonus-card {
            flex: 1;
            background: linear-gradient(145deg, #1e0c0c, #140808);
            border: 1.5px solid #501010;
            border-radius: 18px;
            padding: 14px 8px 12px;
            position: relative;
            box-shadow: 0 5px 0 #080202;
            cursor: pointer;
            transition: all 0.2s;
        }

        .bonus-card:hover {
            transform: translateY(-2px);
            border-color: #a03030;
        }

        .card-icon {
            width: 36px;
            height: 36px;
            background-color: #2a1414;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 10px;
            border: 1px solid #a03030;
        }

        .card-icon svg {
            width: 20px;
            height: 20px;
            fill: #e07070;
        }

        .card-title {
            font-size: 14px;
            font-weight: 800;
            color: white;
            margin-bottom: 4px;
            text-transform: uppercase;
        }

        .card-desc {
            color: #b07878;
            font-size: 10px;
            font-weight: 500;
            margin-bottom: 12px;
            line-height: 1.3;
            min-height: 25px;
        }

        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid #401010;
            padding-top: 8px;
        }

        .reward-badge {
            background-color: #2a1010;
            padding: 3px 6px;
            border-radius: 20px;
            border: 1px solid #a03030;
        }

        .reward-badge span {
            color: #f0a0a0;
            font-weight: 700;
            font-size: 9px;
        }

        .arrow-right {
            color: #c06060;
            font-size: 14px;
            font-weight: bold;
        }

        /* Menu Grid */
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin: 16px 0;
        }

        .menu-item {
            background: linear-gradient(145deg, #1e0c0c, #140808);
            border: 1.5px solid #501010;
            border-radius: 18px;
            padding: 16px 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 5px 0 #080202;
        }

        .menu-item:hover {
            transform: translateY(-2px);
            border-color: #a03030;
        }

        .menu-icon {
            width: 50px;
            height: 50px;
            background: #2a1414;
            border-radius: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 10px;
            border: 2px solid #a03030;
        }

        .menu-icon svg {
            width: 30px;
            height: 30px;
            fill: #e07070;
        }

        .menu-title {
            color: white;
            font-weight: 800;
            font-size: 16px;
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .menu-desc {
            color: #b07878;
            font-size: 10px;
        }

        /* Crash Game */
        .crash-container {
            background: #2a1414;
            border-radius: 18px;
            padding: 20px;
            margin-bottom: 16px;
            border: 1px solid #601010;
            text-align: center;
        }

        .crash-multiplier {
            font-size: 64px;
            font-weight: 800;
            color: #4caf50;
            text-shadow: 0 0 20px rgba(76, 175, 80, 0.5);
            margin: 20px 0;
            transition: all 0.3s;
        }

        .crash-multiplier.crashed {
            color: #f44336;
        }

        .crash-history {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin: 16px 0;
            justify-content: center;
        }

        .crash-history-item {
            background: #1e0c0c;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }

        .crash-history-item.win {
            color: #4caf50;
        }

        .crash-history-item.lose {
            color: #f44336;
        }

        /* Limbo Game */
        .limbo-container {
            background: #2a1414;
            border-radius: 18px;
            padding: 20px;
            margin-bottom: 16px;
            border: 1px solid #601010;
            text-align: center;
        }

        .limbo-result {
            font-size: 64px;
            font-weight: 800;
            color: #ff9800;
            text-shadow: 0 0 20px rgba(255, 152, 0, 0.5);
            margin: 20px 0;
        }

        .limbo-range {
            display: flex;
            gap: 8px;
            margin: 16px 0;
        }

        .limbo-range input[type=range] {
            flex: 1;
            height: 40px;
            background: #1e0c0c;
            border-radius: 20px;
            color: white;
        }

        .limbo-range input[type=number] {
            width: 80px;
            height: 40px;
            background: #1e0c0c;
            border: 1px solid #601010;
            border-radius: 20px;
            color: white;
            padding: 0 15px;
        }

        /* HiLo Game (formerly Gems) */
        .hilo-container {
            background: #2a1414;
            border-radius: 18px;
            padding: 20px;
            margin-bottom: 16px;
            border: 1px solid #601010;
        }

        .hilo-card {
            background: #1e0c0c;
            border-radius: 16px;
            padding: 20px;
            margin: 10px 0;
            border: 2px solid #a03030;
        }

        .hilo-number {
            font-size: 72px;
            font-weight: 800;
            text-align: center;
            color: #ffd700;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
            margin: 20px 0;
        }

        .hilo-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin: 20px 0;
        }

        .hilo-btn {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: none;
            font-size: 20px;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.2s;
        }

        .hilo-btn.high {
            background: linear-gradient(145deg, #4caf50, #2e7d32);
            color: white;
            box-shadow: 0 5px 0 #1b5e20;
        }

        .hilo-btn.low {
            background: linear-gradient(145deg, #f44336, #c62828);
            color: white;
            box-shadow: 0 5px 0 #8b0000;
        }

        .hilo-btn:active {
            transform: translateY(5px);
            box-shadow: none;
        }

        .hilo-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .hilo-multiplier {
            text-align: center;
            font-size: 18px;
            color: #ffd700;
            margin: 10px 0;
        }

        /* Keno Game */
        .keno-container {
            background: #2a1414;
            border-radius: 18px;
            padding: 20px;
            margin-bottom: 16px;
            border: 1px solid #601010;
        }

        .keno-grid {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 5px;
            margin: 20px 0;
        }

        .keno-cell {
            aspect-ratio: 1;
            background: linear-gradient(145deg, #3a1c1c, #2a1414);
            border: 2px solid #601010;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 700;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
        }

        .keno-cell.selected {
            background: linear-gradient(145deg, #4caf50, #2e7d32);
            border-color: #4caf50;
        }

        .keno-cell:hover {
            transform: scale(0.95);
            border-color: #c04040;
        }

        .keno-cell:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .keno-draw {
            font-size: 32px;
            font-weight: 800;
            color: #ffd700;
            text-align: center;
            margin: 20px 0;
        }

        /* Dice Game */
        .dice-container {
            background: #2a1414;
            border-radius: 18px;
            padding: 20px;
            margin-bottom: 16px;
            border: 1px solid #601010;
        }

        .dice-result {
            font-size: 64px;
            font-weight: 800;
            color: #ff9800;
            text-align: center;
            margin: 20px 0;
        }

        .dice-buttons {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin: 20px 0;
        }

        .dice-btn {
            aspect-ratio: 1;
            background: linear-gradient(145deg, #3a1c1c, #2a1414);
            border: 2px solid #601010;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: 800;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
        }

        .dice-btn.selected {
            background: linear-gradient(145deg, #4caf50, #2e7d32);
            border-color: #4caf50;
        }

        .dice-btn:hover {
            transform: scale(0.95);
            border-color: #c04040;
        }

        .dice-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Mines Grid */
        .mines-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 6px;
            margin-bottom: 16px;
            background: #2a1414;
            padding: 12px;
            border-radius: 18px;
            border: 1px solid #601010;
        }

        .mine-cell {
            aspect-ratio: 1;
            background: linear-gradient(145deg, #3a1c1c, #2a1414);
            border: 2px solid #601010;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: 800;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 3px 0 #300808;
        }

        .mine-cell:hover {
            transform: scale(0.95);
            border-color: #c04040;
        }

        .mine-cell.revealed {
            background: #1a0a0a;
            border-color: #a03030;
            box-shadow: none;
            transform: translateY(3px);
        }

        .mine-cell.revealed.mine {
            background: #8b0000;
        }

        .mine-cell.revealed.safe {
            background: #2a5a2a;
        }

        /* Tower Grid */
        .tower-grid {
            display: flex;
            flex-direction: column-reverse;
            gap: 6px;
            margin-bottom: 16px;
            background: #2a1414;
            padding: 12px;
            border-radius: 18px;
            border: 1px solid #601010;
        }

        .tower-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
        }

        .tower-cell {
            aspect-ratio: 1;
            background: linear-gradient(145deg, #3a1c1c, #2a1414);
            border: 2px solid #601010;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 3px 0 #300808;
        }

        .tower-cell:hover {
            transform: scale(0.95);
            border-color: #c04040;
        }

        .tower-cell.revealed {
            background: #1a0a0a;
            border-color: #a03030;
            box-shadow: none;
            transform: translateY(3px);
        }

        .tower-cell.revealed.mine {
            background: #8b0000;
        }

        .tower-cell.revealed.safe {
            background: #2a5a2a;
        }

        .tower-cell.revealed.next {
            background: #3a6a3a;
        }

        /* Slot Machine */
        .slot-container {
            background: #2a1414;
            border-radius: 18px;
            padding: 20px;
            margin-bottom: 16px;
            border: 1px solid #601010;
        }

        .slot-reels {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin: 20px 0;
        }

        .slot-reel {
            width: 80px;
            height: 80px;
            background: #1e0c0c;
            border: 3px solid #a03030;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            font-weight: 800;
            color: white;
            transition: all 0.3s;
        }

        .slot-reel.spinning {
            animation: spin 0.5s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .slot-paytable {
            background: #1e0c0c;
            border-radius: 12px;
            padding: 10px;
            margin: 15px 0;
            font-size: 12px;
        }

        .slot-paytable div {
            display: flex;
            justify-content: space-between;
            color: #b07878;
            padding: 5px;
        }
